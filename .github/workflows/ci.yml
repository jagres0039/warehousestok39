name: CI

on:
  push:
    branches:
      - main
      - "devin/**"
  pull_request:

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
          POSTGRES_DB: warehousestok39_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U warehouse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://warehouse:warehouse@localhost:5432/warehousestok39_ci?schema=public
      AUTH_SECRET: ci-not-secret
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
